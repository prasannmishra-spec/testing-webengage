    .product { border: 1px solid #ccc; padding: 20px; margin: 20px; display: inline-block; }
    button { padding: 10px; margin: 5px; }

<body>
  <h1>🛍️ Clothing Store</h1>

  <!-- Login Section -->
  <div>
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter Name" />
    <button onclick="login()">
    <Login</button>
  </div>

  <!-- Products -->
  <div class="product">
    <h3>T-Shirt</h3>
    <p>₹499</p>
    <button onclick="addToCart('T-Shirt',499)">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Jeans</h3>
    <p>₹999</p>
    <button onclick="addToCart('Jeans',999)">Add to Cart</button>
  </div>

  <!-- Cart -->
  <div>
    <h2>Cart</h2>
    <p id="cartItems">No items</p>
    <button onclick="buy()">Buy Now</button>
  </div>

  <script>
    let cart = [];

    function login() {
      const user = document.getElementById("username").value;
      if(!user) return alert("Enter name");

      webengage.user.login(user);
      webengage.user.setAttribute("name", user);

      alert("Logged in as " + user);
    }

    function addToCart(product, price) {
      cart.push({product, price});
      document.getElementById("cartItems").innerText = cart.map(p => p.product).join(", ");

      webengage.track("Added to Cart", {
        product: product,
        price: price
      });
    }

    function buy() {
      if(cart.length === 0) return alert("Cart is empty");

      let total = cart.reduce((sum, item) => sum + item.price, 0);

      webengage.track("Order Completed", {
        total_amount: total,
        items: cart.length
      });

      alert("Purchase Successful! ₹" + total);
      cart = [];
      document.getElementById("cartItems").innerText = "No items";
    }
  </script>
</body>
</html>
